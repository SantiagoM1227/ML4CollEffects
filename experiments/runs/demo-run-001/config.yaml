# Example, minimal, implementation-agnostic configuration for an experiment run

run_id: demo-run-001
description: "Demo config: template for experiments/runs/<run-id>/config.yaml"

# dataset selection (expected to correspond with files under data/)
dataset:
  name: xsuite_demo
  raw_path: data/raw/xsuite_dataset.npz
  processed_path: data/processed/xsuite_demo_processed.npz
  batch_size: 256

# model selection (high level — concrete model parameters live in src/ or model-specific sections)
model:
  name: neural_operator
  hidden_dim: 128
  num_layers: 6

# training / optimization
training:
  epochs: 100
  learning_rate: 1e-3
  seed: 42
  device: auto

# logging / outputs
output:
  run_dir: experiments/runs/demo-run-001
  checkpoints_dir: experiments/runs/demo-run-001/checkpoints
  metrics_path: experiments/runs/demo-run-001/metrics/metrics.json

# reproducibility metadata 
metadata:
  git_rev: null  # fill with `git rev-parse HEAD` or similar when running
  environment: null  # e.g. output of `pip freeze`
  notes: |
    Minimal example config. Replace or extend fields to match your experiment harness.
